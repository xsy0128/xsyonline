<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言板 - XSY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    /* ========================================
       留言板 — 邮局公告板主题
       ======================================== */

    /* ---- 写信台：横线信纸 ---- */
    .writing-desk {
      background: #FFFEF9;
      border: 4px solid var(--primary);
      box-shadow: 6px 6px 0 var(--secondary);
      padding: 32px 32px 32px 54px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 31px, #E8ECF2 31px, #E8ECF2 32px);
    }

    /* 红色 margin 线 */
    .writing-desk::before {
      content: '';
      position: absolute;
      left: 44px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(233, 30, 140, 0.35);
    }

    /* 信封角标装饰 */
    .writing-desk::after {
      content: '';
      position: absolute;
      top: -36px;
      right: -36px;
      width: 90px;
      height: 90px;
      background: var(--primary);
      transform: rotate(45deg);
      opacity: 0.06;
    }

    .writing-desk .desk-title {
      font-size: 14px;
      color: var(--primary);
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .writing-desk .desk-title::after {
      content: '';
      flex: 1;
      height: 2px;
      background: repeating-linear-gradient(90deg, var(--primary) 0, var(--primary) 4px, transparent 4px, transparent 8px);
      opacity: 0.25;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .form-group { position: relative; z-index: 1; }
    .form-group.full { grid-column: 1 / -1; margin-bottom: 4px; }

    .form-group label {
      display: block;
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .form-group input {
      width: 100%;
      padding: 9px 12px;
      font-family: 'Zpix', 'Press Start 2P', 'Courier New', monospace;
      font-size: 12px;
      border: none;
      border-bottom: 2px dashed #DDD;
      background: transparent;
      color: var(--text);
      outline: none;
      line-height: 1.6;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-bottom-color: var(--primary);
    }

    /* ---- 心情选择器 ---- */
    .mood-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
      margin-bottom: 16px;
    }

    .mood-dot {
      width: 42px;
      height: 42px;
      padding: 0;
      border: 3px solid var(--primary);
      background: var(--bg-light);
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      position: relative;
      font-family: 'Zpix', 'Press Start 2P', 'Courier New', monospace;
    }

    .mood-dot:hover {
      background: #FFF0F5;
      transform: translateY(-2px);
      box-shadow: 3px 3px 0 var(--secondary);
    }

    .mood-dot.active {
      background: var(--primary);
      transform: translateY(-2px);
      box-shadow: 3px 3px 0 var(--secondary);
    }

    .mood-dot.active::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 6px solid var(--primary);
    }

    /* ---- 信件正文区 ---- */
    .letter-textarea-wrap {
      position: relative;
      z-index: 1;
      margin-bottom: 12px;
    }

    .letter-textarea-wrap textarea {
      width: 100%;
      height: 90px;
      padding: 12px;
      font-family: 'Zpix', 'Press Start 2P', 'Courier New', monospace;
      font-size: 12px;
      border: 2px dashed #DDD;
      background: rgba(255,255,255,0.5);
      color: var(--text);
      outline: none;
      line-height: 1.9;
      resize: vertical;
      transition: border-color 0.2s;
    }

    .letter-textarea-wrap textarea:focus {
      border-color: var(--primary);
      background: rgba(255,255,255,0.8);
    }

    /* ---- 投递按钮 ---- */
    .send-btn {
      background: var(--primary);
      color: #fff;
      border: 3px solid var(--secondary);
      padding: 10px 30px;
      font-family: 'Zpix', 'Press Start 2P', 'Courier New', monospace;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--secondary);
      transition: all 0.2s;
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 6px 6px 0 var(--secondary);
    }

    .send-btn:active {
      transform: translateY(0);
      box-shadow: 2px 2px 0 var(--secondary);
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      position: relative;
      z-index: 1;
    }

    /* ---- 邮票统计条 ---- */
    .stamp-stats {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 28px;
      padding: 14px 20px;
      background: var(--bg-card);
      border: 4px solid var(--primary);
      box-shadow: 4px 4px 0 var(--secondary);
      position: relative;
    }

    /* 像素角标 */
    .stamp-stats::after {
      content: '';
      position: absolute;
      inset: -4px;
      pointer-events: none;
      z-index: 1;
      background:
        linear-gradient(to right, var(--ink) 8px, transparent 8px) 0 0 / 12px 3px no-repeat,
        linear-gradient(to bottom, var(--ink) 8px, transparent 8px) 0 0 / 3px 12px no-repeat,
        linear-gradient(to left, var(--ink) 8px, transparent 8px) 100% 0 / 12px 3px no-repeat,
        linear-gradient(to bottom, var(--ink) 8px, transparent 8px) 100% 0 / 3px 12px no-repeat,
        linear-gradient(to right, var(--ink) 8px, transparent 8px) 0 100% / 12px 3px no-repeat,
        linear-gradient(to top, var(--ink) 8px, transparent 8px) 0 100% / 3px 12px no-repeat,
        linear-gradient(to left, var(--ink) 8px, transparent 8px) 100% 100% / 12px 3px no-repeat,
        linear-gradient(to top, var(--ink) 8px, transparent 8px) 100% 100% / 3px 12px no-repeat;
    }

    [data-theme="dark"] .stamp-stats::after {
      background:
        linear-gradient(to right, var(--primary) 8px, transparent 8px) 0 0 / 12px 3px no-repeat,
        linear-gradient(to bottom, var(--primary) 8px, transparent 8px) 0 0 / 3px 12px no-repeat,
        linear-gradient(to left, var(--primary) 8px, transparent 8px) 100% 0 / 12px 3px no-repeat,
        linear-gradient(to bottom, var(--primary) 8px, transparent 8px) 100% 0 / 3px 12px no-repeat,
        linear-gradient(to right, var(--primary) 8px, transparent 8px) 0 100% / 12px 3px no-repeat,
        linear-gradient(to top, var(--primary) 8px, transparent 8px) 0 100% / 3px 12px no-repeat,
        linear-gradient(to left, var(--primary) 8px, transparent 8px) 100% 100% / 12px 3px no-repeat,
        linear-gradient(to top, var(--primary) 8px, transparent 8px) 100% 100% / 3px 12px no-repeat;
    }

    .stamp-stats .stat-divider {
      width: 2px;
      height: 28px;
      background: repeating-linear-gradient(0deg, var(--primary) 0, var(--primary) 3px, transparent 3px, transparent 6px);
      opacity: 0.3;
      flex-shrink: 0;
    }

    .stamp-stats .stat-count {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--primary);
    }

    .stamp-stats .stat-badge {
      background: var(--primary);
      color: #fff;
      padding: 3px 12px;
      font-size: 18px;
      min-width: 32px;
      text-align: center;
    }

    .stamp-stats .stamp-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .mini-stamp {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-dim);
      background: var(--bg-light);
      padding: 5px 10px;
      border: 2px dashed var(--primary);
      border-radius: 3px;
    }

    .mini-stamp .ms-emoji { font-size: 16px; }
    .mini-stamp .ms-count { color: var(--primary); font-weight: bold; }

    /* ---- 软木板 ---- */
    .cork-board {
      background:
        repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(139,115,85,0.04) 3px, rgba(139,115,85,0.04) 6px),
        linear-gradient(160deg, #D7C4A8 0%, #C8A87C 30%, #D4BC98 60%, #BF9E72 100%);
      border: 6px solid #A08060;
      box-shadow:
        inset 0 2px 20px rgba(0,0,0,0.08),
        6px 6px 0 rgba(139,115,85,0.3);
      padding: 28px 24px 32px;
      position: relative;
    }

    /* 软木板像素边框 */
    .cork-board::before {
      content: '';
      position: absolute;
      inset: -6px;
      pointer-events: none;
      z-index: 2;
      background:
        linear-gradient(to right, #6B5030 6px, transparent 6px) 0 0 / 10px 3px no-repeat,
        linear-gradient(to bottom, #6B5030 6px, transparent 6px) 0 0 / 3px 10px no-repeat,
        linear-gradient(to left, #6B5030 6px, transparent 6px) 100% 0 / 10px 3px no-repeat,
        linear-gradient(to bottom, #6B5030 6px, transparent 6px) 100% 0 / 3px 10px no-repeat,
        linear-gradient(to right, #6B5030 6px, transparent 6px) 0 100% / 10px 3px no-repeat,
        linear-gradient(to top, #6B5030 6px, transparent 6px) 0 100% / 3px 10px no-repeat,
        linear-gradient(to left, #6B5030 6px, transparent 6px) 100% 100% / 10px 3px no-repeat,
        linear-gradient(to top, #6B5030 6px, transparent 6px) 100% 100% / 3px 10px no-repeat;
    }

    /* ---- 留言卡片（钉在软木板上） ---- */
    .msg-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px 20px;
      position: relative;
      z-index: 1;
    }

    .msg-card {
      background: #FFFEF7;
      border: 3px solid #D4C5B2;
      box-shadow: 3px 3px 0 rgba(139,115,85,0.2);
      padding: 24px 20px 18px;
      position: relative;
      transition: all 0.3s;
    }

    /* 像素角标 */
    .msg-card::after {
      content: '';
      position: absolute;
      inset: -3px;
      pointer-events: none;
      z-index: 1;
      background:
        linear-gradient(to right, var(--ink) 7px, transparent 7px) 0 0 / 10px 2px no-repeat,
        linear-gradient(to bottom, var(--ink) 7px, transparent 7px) 0 0 / 2px 10px no-repeat,
        linear-gradient(to left, var(--ink) 7px, transparent 7px) 100% 0 / 10px 2px no-repeat,
        linear-gradient(to bottom, var(--ink) 7px, transparent 7px) 100% 0 / 2px 10px no-repeat,
        linear-gradient(to right, var(--ink) 7px, transparent 7px) 0 100% / 10px 2px no-repeat,
        linear-gradient(to top, var(--ink) 7px, transparent 7px) 0 100% / 2px 10px no-repeat,
        linear-gradient(to left, var(--ink) 7px, transparent 7px) 100% 100% / 10px 2px no-repeat,
        linear-gradient(to top, var(--ink) 7px, transparent 7px) 100% 100% / 2px 10px no-repeat;
    }

    [data-theme="dark"] .msg-card::after {
      background:
        linear-gradient(to right, var(--primary) 7px, transparent 7px) 0 0 / 10px 2px no-repeat,
        linear-gradient(to bottom, var(--primary) 7px, transparent 7px) 0 0 / 2px 10px no-repeat,
        linear-gradient(to left, var(--primary) 7px, transparent 7px) 100% 0 / 10px 2px no-repeat,
        linear-gradient(to bottom, var(--primary) 7px, transparent 7px) 100% 0 / 2px 10px no-repeat,
        linear-gradient(to right, var(--primary) 7px, transparent 7px) 0 100% / 10px 2px no-repeat,
        linear-gradient(to top, var(--primary) 7px, transparent 7px) 0 100% / 2px 10px no-repeat,
        linear-gradient(to left, var(--primary) 7px, transparent 7px) 100% 100% / 10px 2px no-repeat,
        linear-gradient(to top, var(--primary) 7px, transparent 7px) 100% 100% / 2px 10px no-repeat;
    }

    /* 微微旋转，像随手钉上去的 */
    .msg-card:nth-child(odd)  { transform: rotate(-1.2deg); }
    .msg-card:nth-child(even) { transform: rotate(0.8deg); }
    .msg-card:nth-child(3n)   { transform: rotate(1.5deg); }

    .msg-card:hover {
      transform: translateY(-6px) rotate(0deg) !important;
      box-shadow: 6px 6px 0 rgba(139,115,85,0.35);
      z-index: 5;
    }

    /* 📌 图钉 */
    .msg-pin {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      z-index: 4;
      filter: drop-shadow(1px 2px 1px rgba(0,0,0,0.25));
      pointer-events: none;
    }

    /* 蜡封 = 心情 */
    .msg-seal {
      position: absolute;
      top: -16px;
      right: 16px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 28%, #FFB0C8, #D63864);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 2px 3px 8px rgba(0,0,0,0.2);
      z-index: 3;
      border: 2px solid rgba(255,255,255,0.25);
    }

    .msg-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-right: 28px;
    }

    .msg-name {
      font-size: 13px;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .msg-name::before {
      content: '✉';
      font-size: 14px;
    }

    .msg-time {
      font-size: 9px;
      color: var(--text-dim);
    }

    .msg-body {
      font-size: 13px;
      color: #5D4E37;
      line-height: 2.0;
    }

    /* 回复气泡 */
    .msg-reply {
      margin-top: 14px;
      padding: 10px 14px;
      background: #FFF0F5;
      border-left: 4px solid var(--primary);
      border-radius: 0 8px 8px 0;
      font-size: 11px;
      color: #999;
      position: relative;
    }

    .msg-reply::before {
      content: '🐰 回复：';
      color: var(--primary);
    }

    /* ---- 浮动信件 ---- */
    .float-mail {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      font-size: 24px;
      opacity: 0.18;
      animation: floatDrift 7s ease-in-out infinite;
    }
    .float-mail.f1 { top: 12%; left: 6%; animation-delay: 0s; font-size: 22px; }
    .float-mail.f2 { top: 18%; right: 8%; animation-delay: 1.5s; font-size: 28px; }
    .float-mail.f3 { top: 55%; left: 4%; animation-delay: 3s; font-size: 20px; }
    .float-mail.f4 { top: 65%; right: 5%; animation-delay: 4.5s; font-size: 26px; }
    .float-mail.f5 { top: 35%; left: 50%; animation-delay: 2s; font-size: 18px; opacity: 0.12; }
    .float-mail.f6 { top: 78%; left: 48%; animation-delay: 5.5s; font-size: 22px; opacity: 0.13; }

    @keyframes floatDrift {
      0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
      25%  { transform: translateY(-18px) translateX(10px) rotate(5deg); }
      50%  { transform: translateY(-8px) translateX(-6px) rotate(-3deg); }
      75%  { transform: translateY(-22px) translateX(14px) rotate(7deg); }
    }

    /* 平板端减少浮动 */
    @media (max-width: 700px) {
      .float-mail.f5, .float-mail.f6 { display: none; }
      .float-mail { opacity: 0.1; font-size: 18px; }
    }

    @media (max-width: 480px) {
      .float-mail { opacity: 0.07; font-size: 16px; }
    }

    /* ---- Toast ---- */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: #fff;
      padding: 12px 24px;
      border: 3px solid var(--secondary);
      box-shadow: 4px 4px 0 var(--secondary);
      font-family: 'Zpix', 'Press Start 2P', 'Courier New', monospace;
      font-size: 12px;
      z-index: 2000;
      animation: toastIn 0.3s ease-out;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ===== 平板 (≤900px) ===== */
    @media (max-width: 900px) {
      .form-row { grid-template-columns: 1fr; }
      .stamp-stats { gap: 10px; padding: 10px 14px; }
      .msg-grid { gap: 20px 16px; }
      .cork-board { padding: 22px 16px 26px; }
    }

    /* ===== 平板竖屏 (≤700px) ===== */
    @media (max-width: 700px) {
      .writing-desk { padding: 18px 14px 18px 34px; }
      .writing-desk::before { left: 26px; }
      .writing-desk .desk-title { font-size: 13px; }
      .msg-grid { grid-template-columns: 1fr; gap: 18px; }
      .msg-card:nth-child(odd),
      .msg-card:nth-child(even),
      .msg-card:nth-child(3n) { transform: rotate(0deg); }
      .msg-card { padding: 18px 14px 14px; }
      .msg-seal { width: 34px; height: 34px; font-size: 16px; top: -12px; }
      .msg-body { font-size: 12px; line-height: 1.8; }
      .msg-name { font-size: 12px; }
      .msg-reply { font-size: 10px; padding: 8px 10px; }
      .send-btn { padding: 8px 20px; font-size: 11px; }
      .mood-dot { width: 36px; height: 36px; font-size: 17px; }
      .stamp-stats { flex-direction: column; align-items: flex-start; gap: 6px; }
      .stamp-stats .stat-divider { display: none; }
      .stamp-stats .stat-count { font-size: 12px; }
      .stamp-stats .stat-badge { font-size: 15px; padding: 2px 10px; }
      .cork-board { padding: 18px 12px 22px; }
    }

    /* ===== 手机 (≤480px) ===== */
    @media (max-width: 480px) {
      .writing-desk { padding: 12px 8px 12px 24px; }
      .writing-desk::before { left: 18px; }
      .msg-seal { width: 28px; height: 28px; font-size: 14px; top: -10px; right: 8px; }
      .msg-pin { font-size: 18px; top: -10px; }
      .msg-card { padding: 14px 10px 10px; }
      .msg-header { padding-right: 16px; }
      .msg-body { font-size: 11px; }
      .msg-reply { font-size: 10px; padding: 6px 8px; }
      .send-btn { padding: 6px 16px; font-size: 10px; }
      .mood-dot { width: 32px; height: 32px; font-size: 15px; }
      .mood-picker { gap: 5px; }
      .form-group input { font-size: 10px; padding: 7px 10px; }
      .letter-textarea-wrap textarea { font-size: 10px; height: 70px; }
      .cork-board { padding: 14px 8px 18px; border-width: 4px; }
    }

    /* ===== 暗色模式 ===== */
    [data-theme="dark"] .writing-desk {
      background-color: #2A2A3C;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(255,255,255,0.03) 31px, rgba(255,255,255,0.03) 32px);
    }

    [data-theme="dark"] .writing-desk::before {
      background: rgba(255,100,130,0.2);
    }

    [data-theme="dark"] .form-group input,
    [data-theme="dark"] .letter-textarea-wrap textarea {
      color: #DDD;
      border-bottom-color: rgba(255,255,255,0.1);
    }

    [data-theme="dark"] .letter-textarea-wrap textarea {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.1);
    }

    [data-theme="dark"] .letter-textarea-wrap textarea:focus {
      background: rgba(255,255,255,0.06);
    }

    [data-theme="dark"] .cork-board {
      background:
        repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.02) 3px, rgba(255,255,255,0.02) 6px),
        linear-gradient(160deg, #3D3528 0%, #4A3D2E 30%, #423828 60%, #3A2E20 100%);
      border-color: var(--primary);
      box-shadow: inset 0 2px 20px rgba(0,0,0,0.3), 6px 6px 0 rgba(255, 64, 129, 0.25);
    }

    [data-theme="dark"] .msg-card {
      background: #2A2A38;
      border-color: var(--primary);
      box-shadow: 3px 3px 0 rgba(255, 64, 129, 0.25);
    }

    [data-theme="dark"] .msg-body {
      color: #D0C8B8;
    }

    [data-theme="dark"] .msg-reply {
      background: rgba(255,64,129,0.08);
      color: #BBB;
    }

    [data-theme="dark"] .mood-dot {
      background: var(--bg-card);
    }

    [data-theme="dark"] .mini-stamp {
      border-color: rgba(255,255,255,0.12);
    }
  </style>
</head>

<body>
  <!-- 浮动信件 -->
  <div class="float-mail f1">✉️</div>
  <div class="float-mail f2">💌</div>
  <div class="float-mail f3">📨</div>
  <div class="float-mail f4">✉️</div>
  <div class="float-mail f5">💌</div>
  <div class="float-mail f6">📨</div>

  <script>
    initScrollReveal('.msg-card', 100);

    var monthAbbr = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

    function updateStats() {
      var items = document.querySelectorAll('#msg-list .msg-card');
      var total = items.length;
      document.getElementById('stat-total').textContent = total;

      var moodCounts = {};
      items.forEach(function(item) {
        var moodEl = item.querySelector('.msg-seal');
        if (moodEl) {
          var mood = moodEl.textContent.trim();
          moodCounts[mood] = (moodCounts[mood] || 0) + 1;
        }
      });

      var sorted = Object.entries(moodCounts).sort(function(a, b) { return b[1] - a[1]; });
      var moodHtml = '';
      sorted.forEach(function(entry) {
        moodHtml += '<div class="mini-stamp"><span class="ms-emoji">' + entry[0] + '</span><span class="ms-count">' + entry[1] + '</span></div>';
      });
      document.getElementById('stat-moods').innerHTML = moodHtml;
    }

    var selectedMood = '😊';
    document.querySelectorAll('.mood-dot').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.mood-dot').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        selectedMood = btn.dataset.mood;
      });
    });

    document.getElementById('submit-msg').addEventListener('click', function() {
      var name = document.getElementById('msg-name').value.trim();
      var content = document.getElementById('msg-content').value.trim();
      if (!name || !content) {
        var toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = '请填写寄信人和信件内容';
        document.body.appendChild(toast);
        setTimeout(function() { toast.remove(); }, 2000);
        return;
      }
      var now = new Date();
      var dateStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
      var item = document.createElement('div');
      item.className = 'msg-card scroll-reveal visible';
      item.innerHTML = '<div class="msg-pin">📌</div>' +
        '<div class="msg-seal">' + selectedMood + '</div>' +
        '<div class="msg-header"><div class="msg-name">' + name + '</div><div class="msg-time">' + dateStr + '</div></div>' +
        '<div class="msg-body">' + content + '</div>';
      var list = document.getElementById('msg-list');
      list.insertBefore(item, list.firstChild);
      updateStats();
      document.getElementById('msg-name').value = '';
      document.getElementById('msg-content').value = '';
      var toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = '✅ 信件已投递，已钉在公告板上';
      document.body.appendChild(toast);
      setTimeout(function() { toast.remove(); }, 2000);
    });
  </script>
